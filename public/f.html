    <div class="container">
      <div class="left">
        <h2>📦 Products</h2>
        <img src="pictuer/maiz.webp" alt="Maize" class="product-banner" />
        <img src="pictuer/milk.webp" alt="Maize" class="product-banner" />
        <img src="pictuer/maiz1.webp" alt="Maize" class="product-banner" />
        <select id="categoryFilter" onchange="filterCategory()">
          <option value="All">All Categories</option>
          <option value="Grains">Grains</option>
          <option value="Dairy">Dairy</option>
          <option value="Drink">Drink</option>
          <option value="Fruit">Fruit</option>
        </select>
        <table id="productTable">
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Add</th>
              <th>remov</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <h3>➕ Add New Product</h3>
        <input type="text" id="newName" placeholder="Product Name" />
        <input type="text" id="newCategory" placeholder="Category" />
        <input type="number" id="newPrice" placeholder="Price UGX" min="1" />
        <button class="add" onclick="addProduct()">Add Product</button>
      </div>

      <div class="right">
        <h2>🧾 Invoice</h2>
        <img src="pictuer/OIP (1).webp " alt="Maize" class="product-banner" />
        <img src="pictuer/beans.webp" alt="Beans" class="product-banner" />
        <img src="pictuer/banan.jpg" alt="Soda" class="product-banner" />

        <div id="invoice">
          <table id="invoiceTable">
            <thead>
              <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Remove</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <h3>Total: <span id="total">0</span> UGX</h3>
          <button class="pdf" onclick="printInvoice()">🖨 Save PDF</button>
          <button class="delete" onclick="resetInvoice()">
            🔄 Reset Invoice
          </button>
        </div>
      </div>
    </div>

    <script>
      const { jsPDF } = window.jspdf;

      let products = JSON.parse(localStorage.getItem("products")) || [
        { name: "Beans", price: 1000, category: "Grains" },
        { name: "Milk", price: 1000, category: "Dairy" },
        { name: "Soda", price: 500, category: "Drink" },
        { name: "Banana", price: 1000, category: "Fruit" },
        { name: "Rice", price: 1000, category: "Grains" },
        { name: "Sugar", price: 2000, category: "Dairy" },
      ];

      let invoice = JSON.parse(localStorage.getItem("invoice")) || [];

      function saveLocal() {
        localStorage.setItem("products", JSON.stringify(products));
        localStorage.setItem("invoice", JSON.stringify(invoice));
      }

      function uniqueCategories() {
        const cats = products.map((p) => p.category);
        return ["All", ...new Set(cats)];
      }

      function filterCategory() {
        const filter = document.getElementById("categoryFilter").value;
        loadProducts(filter);
      }

      function loadProducts(filter = "All") {
        const table = document.querySelector("#productTable tbody");
        table.innerHTML = "";
        document.getElementById("categoryFilter").innerHTML = "";
        uniqueCategories().forEach((c) => {
          let option = document.createElement("option");
          option.value = c;
          option.text = c;
          document.getElementById("categoryFilter").appendChild(option);
        });

        products.forEach((product, index) => {
          if (filter === "All" || product.category === filter) {
            let row = `<tr>
            <td>${product.name}</td>
            <td>${product.category}</td>
            <td>${product.price}</td>
            <td><button class="add" onclick="addToInvoice(${index})">Add</button></td>
            <td><button class="delete" onclick="removeProduct(${index})">Delete</button></td>
        </tr>`;
            table.innerHTML += row;
          }
        });
      }

      function addProduct() {
        const name = document.getElementById("newName").value.trim();
        const category = document.getElementById("newCategory").value.trim();
        const price = parseInt(document.getElementById("newPrice").value);
        if (!name || !category || !price) {
          alert("Please fill all fields!");
          return;
        }
        products.push({ name, category, price });
        saveLocal();
        loadProducts();
        document.getElementById("newName").value = "";
        document.getElementById("newCategory").value = "";
        document.getElementById("newPrice").value = "";
      }
      function removeProduct(index) {
        if (confirm("Are you sure you want to delete this product?")) {
          products.splice(index, 1);
          saveLocal();
          loadProducts();
        }
      }

      function addToInvoice(index) {
        const product = products[index];
        const existing = invoice.find((i) => i.name === product.name);
        if (existing) {
          existing.qty += 1;
          existing.subtotal = existing.qty * product.price;
        } else {
          invoice.push({ name: product.name, qty: 1, subtotal: product.price });
        }
        saveLocal();
        renderInvoice();
      }

      function renderInvoice() {
        const tbody = document.querySelector("#invoiceTable tbody");
        tbody.innerHTML = "";
        let total = 0;
        invoice.forEach((item, idx) => {
          total += item.subtotal;
          let row = `<tr>
            <td>${item.name}</td>
            <td>
            <div class="qty-controls">
                <button onclick="updateQty(${idx},-1)">-</button>
                ${item.qty}
                <button onclick="updateQty(${idx},1)">+</button>
            </div>
            </td>
            <td>${item.subtotal} UGX</td>
            <td><button class="delete" onclick="removeItem(${idx})">Remove</button></td>
        </tr>`;
          tbody.innerHTML += row;
        });
        document.getElementById("total").innerText = total;
        saveLocal();
      }

      function updateQty(index, change) {
        invoice[index].qty += change;
        if (invoice[index].qty <= 0) {
          invoice.splice(index, 1);
        } else {
          const p = products.find((p) => p.name === invoice[index].name);
          invoice[index].subtotal = p.price * invoice[index].qty;
        }
        renderInvoice();
      }

      function removeItem(index) {
        invoice.splice(index, 1);
        renderInvoice();
      }

      function resetInvoice() {
        if (confirm("Do you want to reset the invoice?")) {
          invoice = [];
          renderInvoice();
        }
      }

      function printInvoice() {
        const doc = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
        doc.setFontSize(16);
        doc.text("🧾 Sales Invoice", 105, 15, null, null, "center");
        doc.setFontSize(12);
        let y = 30;
        invoice.forEach((item) => {
          doc.text(`${item.name} x${item.qty} = ${item.subtotal} UGX`, 20, y);
          y += 10;
        });
        doc.setFontSize(14);
        doc.text(
          `Total: ${document.getElementById("total").innerText} UGX`,
          20,
          y + 10,
        );
        const date = new Date().toLocaleString();
        doc.setFontSize(10);
        doc.text(`Date: ${date}`, 20, y + 20);
        doc.save("Invoice.pdf");
      }

      // Load on start
      loadProducts();
      renderInvoice();
    </script>
